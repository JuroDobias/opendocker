inputs:
  # Use receptor_pdbqt for fastest startup (no conversion).
  receptor_pdbqt: /absolute/path/receptor.pdbqt
  # Optional alternative:
  receptor_pdb: /absolute/path/receptor.pdb
  ligands_smiles: /absolute/path/ligands.smi
  reference_core_sdf: /absolute/path/reference_ligand.sdf
  reference_core_smarts: "c1ccccc1"
  ligand_core_smarts: null

box:
  mode: from_reference_ligand
  size: [20.0, 20.0, 20.0]

docking:
  enabled: true
  primary_scorer: vina
  sampler: mc

optimization:
  enabled: true
  # optional: override scorer used in optimization stage only
  # (default is docking.primary_scorer)
  scorer: deeprmsd
  # default true when docking.enabled=false, else false
  freeze_rigid_body: false
  minimizer: lbfgs
  steps: 25
  lr: 0.05

rescoring:
  enabled: true
  scorer: deeprmsd

constraints:
  core:
    enabled: true
    weight: 0.5
    tolerance: 0.5
    force_constant: 1.0
    max_query_mappings: 16
    template_constrained_embed: true
    template_constrained_embed_max_attempts: 20
    rigid_prealign: true
    init_conformers:
      enabled: false
      n_confs: 50
      rmsd_threshold: 0.5
      max_output_conformers: null
      embed_max_attempts: 0
      embed_seed: 1234
    # deprecated/ignored in distance-restraint mode:
    # max_core_rmsd: 2.0

runtime:
  exhaustiveness: 8
  num_modes: 20
  threads: 1
  reuse_enabled: true

outputs:
  dir: ./output
  top_n: 5
